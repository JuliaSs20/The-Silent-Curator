<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Curator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">
        <div id="game-canvas">
            <!-- Three.js will render here -->
        </div>

        <div id="ui-overlay">
            <aside id="panel-tools" class="glass-panel">
                <div class="panel-header">Ferramentas</div>
                <div class="tool-buttons">
                    <button id="btn-loupe" class="tool-btn" title="Lupa">
                        <span class="icon">🔍</span>
                        <span class="label">Lupa</span>
                    </button>
                    <button id="btn-uv" class="tool-btn" title="Luz UV">
                        <span class="icon">🔦</span>
                        <span class="label">Luz UV</span>
                    </button>
                </div>
                <div class="instructions-panel">
                    <h3>Instruções</h3>
                    <p id="artifact-instruction">Carregando instruções...</p>
                </div>
            </aside>

            <main id="panel-inspection">
                <div id="container-objeto">
                    <!-- 3D Object Render Area -->
                    <div class="inspection-guides">
                        <div class="guide-corner tl"></div>
                        <div class="guide-corner tr"></div>
                        <div class="guide-corner bl"></div>
                        <div class="guide-corner br"></div>
                    </div>
                </div>
            </main>

            <aside id="panel-decision" class="glass-panel">
                <div class="ui-manual">
                    <h2 id="artifact-name">Objeto</h2>
                    <div id="decision-container">
                        <p class="decision-text">Após sua análise, este objeto é:</p>
                        <div class="decision-buttons">
                            <button id="btn-normal" class="primary-btn decision-btn">Normal</button>
                            <button id="btn-anomaly" class="primary-btn decision-btn anomaly">Anomalia</button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <div id="feedback-modal" class="hidden">
            <div class="modal-content">
                <h1 id="feedback-title">Veredito</h1>
                <p id="feedback-score"></p>
                <button id="btn-next" class="primary-btn">Próximo Artefato</button>
            </div>
        </div>

        <div id="game-over-modal" class="hidden">
            <div class="modal-content">
                <h1 id="game-over-title">Fim de Jogo</h1>
                <p id="game-over-message">Você falhou na curadoria. Um erro grave foi cometido.</p>
                <button id="btn-restart" class="primary-btn">Tentar Novamente</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
