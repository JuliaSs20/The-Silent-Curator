<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Curator | Antigravity Engine</title>
</head>

<body>
    <div id="app">
        <div id="game-canvas">
            <!-- Three.js renders here -->
        </div>

        <div id="ui-overlay">
            <aside id="panel-tools" class="glass-panel">
                <div class="panel-header">Instrumentos</div>
                <div class="tool-buttons">
                    <button id="btn-loupe" class="tool-btn" title="Lupa de Alta Precisão">
                        <span class="icon">🔍</span>
                        <div class="label-group">
                            <span class="label">Lupa</span>
                        </div>
                    </button>
                    <button id="btn-uv" class="tool-btn" title="Luz Ultravioleta">
                        <span class="icon">🔦</span>
                        <div class="label-group">
                            <span class="label">Luz UV</span>
                        </div>
                    </button>
                    <button id="btn-scale" class="tool-btn" title="Balança de Precisão">
                        <span class="icon">⚖️</span>
                        <div class="label-group">
                            <span class="label">Balança</span>
                        </div>
                    </button>
                </div>
            </aside>

            <aside id="panel-decision" class="glass-panel">
                <div class="ui-manual">
                    <h2>Veredito</h2>
                    <div id="checklist-container">
                        <label class="check-item">
                            <input type="checkbox" id="check-anacronismo">
                            Anacronismo Detectado
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-mistico">
                            Propriedade Anômala
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-falso">
                            Falsificação Técnica
                        </label>
                    </div>
                    <button id="btn-finalizar" class="primary-btn">Selar Documento</button>
                </div>
            </aside>
        </div>

        <div id="feedback-modal" class="hidden">
            <div class="modal-content">
                <h1 id="feedback-title">RELATÓRIO</h1>
                <p id="feedback-score"></p>
                <button id="btn-next" class="primary-btn">Próximo Artefato</button>
            </div>
        </div>

        <!-- Physical Stamp Overlay -->
        <div id="stamp-mark" class="stamp-reveal">AUTÊNTICO</div>
    </div>
    
    <script type="module" src="/main.js"></script>
</body>

</html>
