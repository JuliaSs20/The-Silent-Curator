<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Curator</title>
  <script type="module" crossorigin src="/assets/index-qfoC_BW2.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CjPl0n1q.css">
</head>

<body>
    <div id="app">
        <div id="game-canvas">
            <!-- Three.js will render here -->
        </div>

        <div id="ui-overlay">
            <aside id="panel-tools" class="glass-panel">
                <div class="panel-header">Ferramentas</div>
                <div class="tool-buttons">
                    <button id="btn-loupe" class="tool-btn" title="Lupa">
                        <span class="icon">🔍</span>
                        <span class="label">Lupa</span>
                    </button>
                    <button id="btn-uv" class="tool-btn" title="Luz UV">
                        <span class="icon">🔦</span>
                        <span class="label">Luz UV</span>
                    </button>
                    <div id="stamp-drag" class="tool-btn stamp" draggable="true">
                        <span class="icon">🧧</span>
                        <span class="label">Carimbo</span>
                    </div>
                </div>
            </aside>

            <main id="panel-inspection">
                <div id="container-objeto">
                    <!-- 3D Object Render Area -->
                    <div class="inspection-guides">
                        <div class="guide-corner tl"></div>
                        <div class="guide-corner tr"></div>
                        <div class="guide-corner bl"></div>
                        <div class="guide-corner br"></div>
                    </div>
                </div>
            </main>

            <aside id="panel-decision" class="glass-panel">
                <div class="ui-manual">
                    <h2>Manual de Curadoria</h2>
                    <div id="checklist-container">
                        <label class="check-item">
                            <input type="checkbox" id="check-anacronismo">
                            <span class="checkmark"></span>
                            Anacronismo (Ex: Fones, QR Code)
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-mistico">
                            <span class="checkmark"></span>
                            Propriedades Místicas (Pisca/Move)
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-falso">
                            <span class="checkmark"></span>
                            Falsificação (Assinatura/Material)
                        </label>
                    </div>
                    <button id="btn-finalizar" class="primary-btn">Enviar Veredito</button>
                </div>
            </aside>
        </div>

        <div id="feedback-modal" class="hidden">
            <div class="modal-content">
                <h1 id="feedback-title">Veredito</h1>
                <p id="feedback-score"></p>
                <button id="btn-next" class="primary-btn">Próximo Artefato</button>
            </div>
        </div>
    </div>
</body>

</html>
